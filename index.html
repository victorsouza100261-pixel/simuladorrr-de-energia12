<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Conta de Energia - Estilo PhET</title>
    <style>
        :root {
            --phet-blue: #2980b9;
            --phet-yellow: #f1c40f;
        }
        body { font-family: 'Arial', sans-serif; background-color: #ecf0f1; display: flex; flex-direction: column; align-items: center; }
        .canvas-container { background: #fff; border: 3px solid var(--phet-blue); border-radius: 10px; padding: 20px; width: 90%; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .control-group { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--phet-blue); }
        .bill-display { background: #2c3e50; color: #fff; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .price-tag { font-size: 2em; color: var(--phet-yellow); }
        input[type="range"] { width: 100%; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Simulador de Consumo Elétrico</h1>

    <div class="canvas-container">
        <div id="visual-area" style="text-align: center; font-size: 50px;">
            💡 <span id="bulb-intensity">✨</span>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Potência do Aparelho (Watts)</label>
                <input type="range" id="power" min="10" max="5000" value="1000" step="10">
                <span id="power-val">1000 W</span>
            </div>

            <div class="control-group">
                <label>Uso Diário (Horas)</label>
                <input type="range" id="hours" min="1" max="24" value="5">
                <span id="hours-val">5 h</span>
            </div>

            <div class="control-group">
                <label>Dias no Mês</label>
                <input type="number" id="days" value="30" min="1" max="31">
            </div>

            <div class="control-group">
                <label>Tarifa (R$ por kWh)</label>
                <input type="number" id="rate" value="0.95" step="0.01">
            </div>
        </div>

        <div class="bill-display">
            <h3>Estimativa da Conta Mensal</h3>
            <div class="price-tag" id="total-price">R$ 0,00</div>
            <p>Consumo total: <span id="total-kwh">0</span> kWh</p>
        </div>
    </div>

    <script>
        const inputs = ['power', 'hours', 'days', 'rate'];
        
        function calculate() {
            const p = parseFloat(document.getElementById('power').value);
            const h = parseFloat(document.getElementById('hours').value);
            const d = parseFloat(document.getElementById('days').value);
            const r = parseFloat(document.getElementById('rate').value);

            // Atualiza labels
            document.getElementById('power-val').innerText = p + ' W';
            document.getElementById('hours-val').innerText = h + ' h';

            // Lógica do Cálculo
            // Consumo (kWh) = (Potência * Horas * Dias) / 1000
            const kwh = (p * h * d) / 1000;
            const total = kwh * r;

            // Interface
            document.getElementById('total-kwh').innerText = kwh.toFixed(2);
            document.getElementById('total-price').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            // Efeito visual na lâmpada
            document.getElementById('bulb-intensity').style.opacity = p / 5000;
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        calculate(); // Inicializa
    </script>
</body>
</html>
